name: Docker Build

on:
  push:
    tags: ["v*"]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: ai-face-matching-api:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ml
          push: false
          tags: ai-face-matching-ml:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
